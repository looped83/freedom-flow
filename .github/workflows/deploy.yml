name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only contents:write needed – we push directly to the gh-pages branch.
# No pages:write or id-token:write required; no pages-specific actions used.
permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Push dist/ as the gh-pages branch using plain git – no Node.js action involved.
      - name: Deploy to gh-pages branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cd dist
          git init -b gh-pages
          git add --all
          git commit -m "Deploy ${{ github.sha }}"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            gh-pages
